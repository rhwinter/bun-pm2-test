upstream bunworkers {
    least_conn;

    server 127.0.0.1:5556;
    server 127.0.0.1:5557;
    server 127.0.0.1:5558;

    # Reuse connections to workers instead of opening a new one per request.
    # Tune to roughly (instances * expected_concurrency_per_instance).
    keepalive 32;
}

server {
    listen 5555;
    server_name localhost;

    location / {
        proxy_pass http://bunworkers;

        # Required for upstream keepalive to work.
        proxy_http_version 1.1;
        proxy_set_header Connection "";

        # Forward real client info.
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Must exceed your worst-case response time.
        # Set to 3× your p99 — if massive requests can take 5s, use 30s.
        proxy_read_timeout    30s;
        proxy_connect_timeout  5s;
        proxy_send_timeout    30s;

        # If a worker fails mid-request, retry on the next one.
        # Safe for GET/HEAD; remove for mutations if retrying is not idempotent.
        proxy_next_upstream error timeout;
        proxy_next_upstream_timeout 10s;
    }
}
